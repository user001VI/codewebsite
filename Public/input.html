<input id="code">
<button onclick="send()">Enter</button>
<p id="msg"></p>

<script>
async function send() {
  const code = document.getElementById("code").value;

  const res = await fetch("/check", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ code })
  });

  const data = await res.json();

  if (data.ok) {
    window.location = data.go;
  } else {
    document.getElementById("msg").innerText = "Wrong code";
  }
}
  app.get("/", (req, res) => {
  res.send(`
    <html>
    <head>
      <title>Enter Code</title>
      <style>
        body {
          margin: 0;
          height: 100vh;
          display: flex;
          justify-content: center;
          align-items: center;
          background: linear-gradient(135deg, #1e1e2f, #3a3a6a);
          font-family: Arial, sans-serif;
          color: white;
        }

        .container {
          background: rgba(0,0,0,0.6);
          padding: 40px;
          border-radius: 20px;
          text-align: center;
          box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h1 {
          margin-bottom: 20px;
        }

        input {
          padding: 10px;
          border-radius: 8px;
          border: none;
          width: 200px;
          margin-bottom: 15px;
          font-size: 16px;
        }

        button {
          padding: 10px 20px;
          border: none;
          border-radius: 8px;
          background: #6c63ff;
          color: white;
          font-size: 16px;
          cursor: pointer;
          transition: 0.2s;
        }

        button:hover {
          background: #5848d6;
        }
      </style>
    </head>

    <body>
      <div class="container">
        <h1>Enter Access Code</h1>
        <form method="POST" action="/check">
          <input type="text" name="code" placeholder="Enter code..." required />
          <br>
          <button type="submit">Unlock</button>
        </form>
      </div>
    </body>
    </html>
  `);
});

</script>
